<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Petition Details</title>
</head>
<body>
<h1 th:text="${petition.title}">Petition Title</h1>

<p><strong>Description:</strong> <span th:text="${petition.description}"></span></p>
<p><strong>Created by:</strong> <span th:text="${petition.creatorName}"></span></p>

<h2>Sign this Petition</h2>
<form th:action="@{/petitions/{id}/sign(id=${petition.id})}" th:object="${signature}" method="post">
  <div>
    <label>Name:</label>
    <input type="text" th:field="*{name}" required>
  </div>
  <div>
    <label>Email:</label>
    <input type="email" th:field="*{email}" required>
  </div>
  <button type="submit">Sign Petition</button>
</form>

<h2>Signatures</h2>
<ul>
  <li th:each="sig : ${petition.signatures}">
    <span th:text="${sig.name}"></span> -
    <span th:text="${sig.email}"></span>
  </li>
</ul>

<p><a href="/petitions">Back to petitions</a></p>
</body>
</html>
