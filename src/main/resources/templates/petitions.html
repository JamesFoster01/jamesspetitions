<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>All Petitions</title>
</head>
<body>
<h1>All Petitions -CI/CD DEMO</h1>

<p>
  <a th:href="@{/petitions/create}">Create Petition</a> |
  <a th:href="@{/petitions/search}">Search Petitions</a>
</p>

<ul>
  <li th:each="petition : ${petitions}">
    <a th:href="@{/petitions/{id}(id=${petition.id})}" th:text="${petition.title}"></a>
    - created by <span th:text="${petition.creatorName}"></span>
  </li>
</ul>
</body>
</html>
